name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

jobs:
  build-secure-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devsecops-app

    steps:
    # ✅ Checkout full repo (important for Gitleaks)
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # 🐳 Build Docker Image
    - name: Build Docker Image
      run: |
        cd app
        docker build -t devsecops-app:${{ github.sha }} .

    # 🔐 Gitleaks Full Scan (fail on secrets)
    - name: Run Gitleaks Scan
      run: |
        docker run --rm -v $(pwd):/repo zricethezav/gitleaks detect \
          --source=/repo \
          --no-git \
          --verbose \
          --redact \
          --exit-code=1

    # 🛡 Trivy Scan (non-blocking)
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: devsecops-app:${{ github.sha }}
        format: table
        exit-code: 0
        severity: CRITICAL,HIGH
        ignore-unfixed: true

    # 🔑 Login to DockerHub
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 🏷 Tag Docker Image
    - name: Tag Docker Image
      run: |
        docker tag devsecops-app:${{ github.sha }} ${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker tag devsecops-app:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

    # 🚀 Push Docker Image
    - name: Push Docker Image
      run: |
        docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.IMAGE_NAME }}:latest

    # ☸️ Optional CD: deploy pushed commit image to Kubernetes
    - name: Deploy to Kubernetes
      if: ${{ secrets.KUBE_CONFIG_DATA != '' }}
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > $HOME/.kube/config
        kubectl set image deployment/devsecops-app devsecops-app=${{ env.IMAGE_NAME }}:${{ github.sha }} --record
        kubectl rollout status deployment/devsecops-app --timeout=180s

    # ✅ Final Success Message
    - name: Pipeline Success
      if: success()
      run: echo "✅ CI/CD + Security + Deployment Pipeline Successful!"