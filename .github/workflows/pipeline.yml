name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

jobs:
  build-secure-deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout full repo (important for Gitleaks)
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # 🐳 Build Docker Image
    - name: Build Docker Image
      run: |
        cd app
        docker build -t devsecops-app .

    # 🔐 Gitleaks Full Scan (fail on secrets)
    - name: Run Gitleaks Scan
      run: |
        docker run --rm -v $(pwd):/repo zricethezav/gitleaks detect \
          --source=/repo \
          --no-git \
          --verbose \
          --redact \
          --exit-code=1

    # 🛡 Trivy Scan (non-blocking)
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: devsecops-app
        format: table
        exit-code: 0
        severity: CRITICAL,HIGH
        ignore-unfixed: true

    # 🔑 Login to DockerHub
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 🏷 Tag Docker Image
    - name: Tag Docker Image
      run: |
        docker tag devsecops-app ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

    # 🚀 Push Docker Image
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

    # ✅ Final Success Message
    - name: Pipeline Success
      if: success()
      run: echo "✅ CI/CD + Security + Deployment Pipeline Successful!"